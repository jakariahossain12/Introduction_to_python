<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-body-tertiary">
    <!-- nev -->
    <nav class="navbar bg-body-tertiary pt-5">
      <div class="container-fluid justify-content-center">
        <form class="d-flex w-75 " role="search">
          <input
          id="Search_input"
            class="form-control me-2 "
            type="search"
            placeholder="Search by Name"
            aria-label="Search"
          />
          <button id="Search" class="btn btn-outline-success" type="submit">Search</button>
        </form>
      </div>
    </nav>

    <div class="container mt-5">
  <div class="row">
    
    <div id="Card_container" class="col-md-9 bg-light d-flex flex-wrap gap-2   p-4">


      
    </div>

    <div class="col-md-3 text-black p-4">
  <h3>Total Cart : <span id="count-cart">0</span></h3>

  <table class="table">
    <thead>
      <tr>
        <th scope="col">SL</th>
        <th scope="col">Img</th>
        <th scope="col">Name</th>
      </tr>
    </thead>

    <tbody id="cart-body" class="table-group-divider">
     
      
    </tbody>
  </table>
</div>


<!-- modal -->

<div class="modal fade" id="detailsModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h1 class="modal-title fs-5" id="modalTitle"></h1>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal">
        </button>
      </div>

      <div class="modal-body">
        <img id="modalImg" class="img-fluid mb-3">

        <h5>Category</h5>
        <p id="modalCategory"></p>

        <h5>Alcoholic</h5>
        <p id="modalAlcohol"></p>

        <h5>Instructions</h5>
        <p id="modalInstruction"></p>
      </div>

    </div>
  </div>
</div>






    <!-- script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
